name: Study Task to Notion

on:
  repository_dispatch:
    types: [study_task]

jobs:
  write-task:
    runs-on: ubuntu-latest
    steps:
      - name: Send task to Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          python3 <<'PYEOF'
          import os, json, urllib.request, urllib.error

          payload = json.loads(os.environ["PAYLOAD"])
          token   = os.environ["NOTION_TOKEN"]
          ds_id   = os.environ["NOTION_DATA_SOURCE_ID"]

          title  = payload.get("title", "").strip() or "Untitled"
          date   = payload["date"]
          module = payload.get("module")  # single string or null
          status = payload.get("status", "Not started")

          properties = {
              "Name": {
                  "title": [{"text": {"content": title}}]
              },
              "Date": {
                  "date": {"start": date}
              },
              "Status": {
                  "status": {"name": status}
              }
          }

          # Module is a select, not multi_select. Only set if a value was chosen.
          if module:
              properties["Module"] = {"select": {"name": module}}

          body = {
              "parent": {
                  "type": "data_source_id",
                  "data_source_id": ds_id
              },
              "properties": properties
          }

          req = urllib.request.Request(
              "https://api.notion.com/v1/pages",
              data=json.dumps(body).encode("utf-8"),
              headers={
                  "Authorization": f"Bearer {token}",
                  "Notion-Version": "2025-09-03",
                  "Content-Type": "application/json"
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(req) as r:
                  print("OK:", r.status)
                  print(r.read().decode("utf-8")[:500])
          except urllib.error.HTTPError as e:
              print("HTTP error:", e.code)
              print(e.read().decode("utf-8"))
              raise
          PYEOF
